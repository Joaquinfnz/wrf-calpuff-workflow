# =============================================================================
# Biblioteca de Factores de Emision
# Fuentes: EPA AP-42 (5ta ed), SEA Chile "Recopilacion de Factores de Emision"
# =============================================================================

# ── Combustion ───────────────────────────────────────────────────────────────
caldera_gas_natural:
  descripcion: Caldera/Horno a gas natural (EPA AP-42 §1.4)
  contaminantes:
    SO2:
      factor_g_MW: 0.08    # g/s por MW termico
      fuente: EPA AP-42 §1.4 (0.0006 lb/MMBtu)
    NOx:
      factor_g_MW: 0.13    # g/s por MW
      fuente: EPA AP-42 §1.4 (0.1 lb/MMBtu)
    MP10:
      factor_g_MW: 0.009   # g/s por MW
      fuente: EPA AP-42 §1.4 (0.0075 lb/MMBtu)
    CO:
      factor_g_MW: 0.11    # g/s por MW
      fuente: EPA AP-42 §1.4 (0.084 lb/MMBtu)
    MP2_5:
      factor_g_MW: 0.009   # Igual MP10 (gas natural)
      fuente: EPA AP-42 §1.4

caldera_diesel:
  descripcion: Caldera/Grupo electrogeno diesel (EPA AP-42 §3.3)
  contaminantes:
    SO2:
      factor_g_MW: 0.45    # g/s por MW
      fuente: EPA AP-42 §3.3 (0.29 lb/MMBtu, S=0.05%)
    NOx:
      factor_g_MW: 1.3     # g/s por MW
      fuente: EPA AP-42 §3.3 (1.0 lb/MMBtu)
    MP10:
      factor_g_MW: 0.04    # g/s por MW
      fuente: EPA AP-42 §3.3 (0.031 lb/MMBtu)
    CO:
      factor_g_MW: 0.11    # g/s por MW
      fuente: EPA AP-42 §3.3

grupo_electrogeno:
  descripcion: Grupo electrogeno (EPA AP-42 §3.3, diesel)
  contaminantes:
    SO2:
      factor_g_MW: 0.45
      fuente: EPA AP-42 §3.3
    NOx:
      factor_g_MW: 1.3
      fuente: EPA AP-42 §3.3
    MP10:
      factor_g_MW: 0.05
      fuente: EPA AP-42 §3.3
    CO:
      factor_g_MW: 0.15
      fuente: EPA AP-42 §3.3

# ── Procesamiento de aridos ─────────────────────────────────────────────────
chancado:
  descripcion: Chancado/molino de aridos (EPA AP-42 §11.19.2, tertiary)
  contaminantes:
    MP10:
      factor_kg_ton: 0.027       # kg/ton procesada (sin control)
      factor_kg_ton_controlado: 0.0027  # kg/ton (con control)
      fuente: EPA AP-42 §11.19.2 (tertiary crushing)
    MP2_5:
      factor_kg_ton: 0.004      # kg/ton (~15% de MP10)
      factor_kg_ton_controlado: 0.0004
      fuente: Fraccion fina, EPA AP-42

acopio_aridos:
  descripcion: Acopio de aridos — erosion eolica (EPA AP-42 §13.2.5)
  contaminantes:
    MP10:
      factor_base: 0.000017     # g/m²/s (base, viento 5 m/s, sin control)
      fuente: EPA AP-42 §13.2.5 (storage pile wind erosion)
    MP2_5:
      factor_base: 0.000004     # g/m²/s (~21% de MP10)
      fuente: Fraccion fina, EPA AP-42

carguio:
  descripcion: Carguio de material (EPA AP-42 §13.2.4, batch drop)
  contaminantes:
    MP10:
      factor_kg_ton: 0.0001     # kg/ton cargada
      fuente: EPA AP-42 §13.2.4 (aggregate handling)
    MP2_5:
      factor_kg_ton: 0.00002
      fuente: Fraccion fina

# ── Tránsito ─────────────────────────────────────────────────────────────────
transito_no_pavimentado:
  descripcion: Caminos no pavimentados (EPA AP-42 §13.2.2)
  formula: E = k * (s/12)^a * (W/3)^b  [lb/VMT]
  parametros:
    k_pm10: 1.5
    a: 0.9
    b: 0.45
    silt_default: 8      # % finos, default EPA
    peso_default: 25     # ton, peso medio vehiculo
  contaminantes:
    MP10:
      fuente: EPA AP-42 §13.2.2 (unpaved roads, industrial)
    MP2_5:
      fraccion_mp10: 0.15   # 15% de MP10
      fuente: Fraccion fina, EPA AP-42

transito_pavimentado:
  descripcion: Caminos pavimentados (EPA AP-42 §13.2.1)
  formula: E = k * (sL/2)^0.65 * (W/3)^1.5  [lb/VMT]
  parametros:
    k_pm10: 0.016
    silt_default: 2      # silt loading g/m²
    peso_default: 20     # ton
  contaminantes:
    MP10:
      fuente: EPA AP-42 §13.2.1
    MP2_5:
      fraccion_mp10: 0.25
      fuente: Fraccion fina

# ── Extraccion / movimiento de tierra ───────────────────────────────────────
extraccion_aridos:
  descripcion: Extraccion de aridos — excavacion y movimiento (EPA AP-42 §11.9)
  contaminantes:
    MP10:
      factor_kg_ton: 0.005     # kg/ton extraida
      fuente: EPA AP-42 §11.9 (western surface coal mining)
    MP2_5:
      factor_kg_ton: 0.001
      fuente: Fraccion fina

# ── Perforacion ─────────────────────────────────────────────────────────────
perforacion:
  descripcion: Perforacion en roca (EPA AP-42 §11.9)
  contaminantes:
    MP10:
      factor_kg_m: 0.0001     # kg/m perforado
      fuente: EPA AP-42 §11.9
    MP2_5:
      factor_kg_m: 0.00002
      fuente: Fraccion fina
